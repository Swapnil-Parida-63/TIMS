name: CI/CD — Build & Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  # ── Job 1: Build & Push Docker Images ──────────────────────────────────────
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build + push server image
      - name: Build & push server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/tims-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build + push client image
      - name: Build & push client image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/tims-client:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 2: Deploy to EC2 ───────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build   # only runs after images are successfully pushed

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Pull the latest images
            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/tims-server:latest
            docker pull ${{ secrets.DOCKER_HUB_USERNAME }}/tims-client:latest

            # Navigate to project directory and restart containers
            cd /home/${{ secrets.EC2_USER }}/tims
            docker compose down
            docker compose up -d

            # Clean up old images
            docker image prune -f
